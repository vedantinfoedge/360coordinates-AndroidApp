# Project-wide Gradle settings.

# AndroidX package structure (required by React Native and Firebase)
android.useAndroidX=true

# Disable Jetifier - React Native 0.83+ and Hermes are already AndroidX.
# Enabling it caused Java heap space errors when transforming large AARs.
android.enableJetifier=false

# Hermes JS engine (default for React Native 0.83+)
hermesEnabled=true

# Gradle JVM: more heap to avoid "Java heap space" (use -Xmx4g if you have 8GB RAM)
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
